<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify PIN</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pin.css') }}">
</head>
<body>
    <div class="login-container">
        <h2>Verify PIN</h2>
        <p>Please enter your PIN to continue.</p>
        <form action="/verify_pin_refresh" method="post">
            <input type="password" name="pin" class="form-input" placeholder="PIN" maxlength="6" required>
            <button type="submit" class="form-button">Verify</button>
        </form>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
